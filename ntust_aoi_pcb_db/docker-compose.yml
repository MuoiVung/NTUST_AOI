services:
  # PostgreSQL Database (Architecture 2)
  postgres:
    image: postgres:18
    command:
      - "postgres"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_destination=stderr,csvlog"
      - "-c"
      - "log_statement=mod"
    container_name: aoi_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_ROOT_USER} # Reusing env vars for convenience
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD} # Reusing env vars for convenience
      POSTGRES_DB: pcb_aoi_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ROOT_USER} -d pcb_aoi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin 4 (Web UI for Postgres)
  pgadmin:
    image: dpage/pgadmin4
    container_name: aoi_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Nginx - To serve images via HTTP (Simulating Object Storage Access)
  # This allows the "Remote Training Machine" to download images.
  image_server:
    image: nginx:alpine
    container_name: aoi_image_server
    restart: always
    ports:
      - "8080:80"
    volumes:
      # Mount the SHARED images folder
      - ./images:/usr/share/nginx/html/images:ro

      # Mount the custom absolute path using the environment variable
      - ${IMAGE_WATCH_DIR}:${IMAGE_WATCH_DIR_CONTAINER}:ro

      # Mount Config & Auth
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd
